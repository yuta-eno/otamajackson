<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>オタマジャクソン育成ゲーム</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-100 overscroll-none touch-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STAGES = [
      { id: 0, name: 'オタマジャクシ', requiredXp: 0, desc: '元気なオタマジャクソン！' },
      { id: 1, name: '後脚はえた！', requiredXp: 100, desc: '後ろ足が生えてきたよ。' },
      { id: 2, name: '四本足！', requiredXp: 250, desc: '前足も生えてカエルに近づいた！' },
      { id: 3, name: 'しっぽカエル', requiredXp: 450, desc: '顔がカエルになってきた！' },
      { id: 4, name: '立派なカエル', requiredXp: 800, desc: 'ついにカエルになった！！' },
      { id: 5, name: 'ツッパリガエル', requiredXp: 800, desc: 'お世話をサボられてグレちゃった…' },
    ];

    const FOODS = [
      { id: 'grass', name: 'みずくさ', emoji: '🌿', full: 20, mood: 0, xp: 10, desc: '普通のごはん' },
      { id: 'worm', name: 'イトミミズ', emoji: '🦐', full: 40, mood: 5, xp: 25, desc: '大好物！栄養満点' },
      { id: 'snack', name: 'おやつ', emoji: '🍩', full: 10, mood: 30, xp: 5, desc: 'ご機嫌になるよ' },
    ];

    const OtamajacksonSVG = ({ stageIdx, anim }) => {
      let animClass = '';
      if (anim === 'happy') animClass = 'animate-[happy-jump_0.5s_ease-in-out_2]';
      if (anim === 'sad') animClass = 'animate-[sad-shake_0.2s_linear_infinite]';
      if (anim === 'angry') animClass = 'animate-[angry-shake_0.1s_linear_infinite]';
      if (anim === 'eat') animClass = 'animate-[eat-bounce_0.4s_ease-in-out_2]';
      if (anim === 'idle') animClass = 'animate-[float_2s_ease-in-out_infinite]';

      const isBadFrog = stageIdx === 5;
      const baseColor = isBadFrog ? "#a855f7" : (stageIdx >= 3 ? "#4ade80" : "#1f2937");
      
      return (
        <div className={`w-48 h-48 relative ${animClass}`}>
          <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
            {stageIdx < 4 && (
               <path d={stageIdx === 3 ? "M 50 70 Q 50 85 45 90" : "M 50 65 Q 40 80 50 95 Q 60 80 50 65"} fill={baseColor} className="origin-[50%_65%] animate-[tail-wag_0.5s_ease-in-out_infinite_alternate]" />
            )}
            {stageIdx >= 1 && (
              <g fill={baseColor}>
                <path d="M 30 60 Q 15 70 20 80" strokeWidth="4" stroke={baseColor} fill="none" strokeLinecap="round" />
                <path d="M 70 60 Q 85 70 80 80" strokeWidth="4" stroke={baseColor} fill="none" strokeLinecap="round" />
                <circle cx="20" cy="80" r="3" />
                <circle cx="80" cy="80" r="3" />
              </g>
            )}
            {stageIdx >= 2 && (
              <g fill={baseColor}>
                <path d="M 35 45 Q 20 50 25 60" strokeWidth="4" stroke={baseColor} fill="none" strokeLinecap="round" />
                <path d="M 65 45 Q 80 50 75 60" strokeWidth="4" stroke={baseColor} fill="none" strokeLinecap="round" />
                <circle cx="25" cy="60" r="2.5" />
                <circle cx="75" cy="60" r="2.5" />
              </g>
            )}
            {stageIdx >= 3 ? (
              <g>
                <ellipse cx="50" cy="45" rx="30" ry="25" fill={baseColor} />
                <circle cx="35" cy="28" r="8" fill={baseColor} />
                <circle cx="65" cy="28" r="8" fill={baseColor} />
                {isBadFrog ? (
                  <g>
                    <path d="M 25 15 Q 50 -10 75 15 Q 80 25 50 20 Q 20 25 25 15 Z" fill="#111827" />
                    <polygon points="25,25 45,25 40,35 30,35" fill="#111827" />
                    <polygon points="55,25 75,25 70,35 60,35" fill="#111827" />
                    <line x1="45" y1="28" x2="55" y2="28" stroke="#111827" strokeWidth="2" />
                    <path d="M 40 55 Q 50 45 60 55" stroke="black" strokeWidth="2" fill="none" />
                  </g>
                ) : (
                  <g>
                    <circle cx="35" cy="28" r="5" fill="white" />
                    <circle cx="65" cy="28" r="5" fill="white" />
                    <circle cx={anim === 'sad' ? "35" : "37"} cy={anim === 'sad' ? "30" : "28"} r="2" fill="black" />
                    <circle cx={anim === 'sad' ? "65" : "63"} cy={anim === 'sad' ? "30" : "28"} r="2" fill="black" />
                  </g>
                )}
                {anim === 'angry' && !isBadFrog && (
                  <g>
                    <path d="M 75 10 L 80 15 L 75 20 M 80 15 L 85 10 M 80 15 L 85 20" stroke="red" strokeWidth="2" fill="none" />
                    <line x1="25" y1="20" x2="40" y2="25" stroke="#111827" strokeWidth="3" strokeLinecap="round" />
                    <line x1="75" y1="20" x2="60" y2="25" stroke="#111827" strokeWidth="3" strokeLinecap="round" />
                  </g>
                )}
                {!isBadFrog && (
                  anim === 'angry' || anim === 'sad' ? (
                    <path d="M 40 55 Q 50 50 60 55" stroke="black" strokeWidth="2" fill="none" />
                  ) : anim === 'eat' ? (
                    <circle cx="50" cy="50" r="5" fill="#991b1b" />
                  ) : (
                    <path d="M 40 50 Q 50 60 60 50" stroke="black" strokeWidth="2" fill="none" />
                  )
                )}
                {anim !== 'angry' && !isBadFrog && (
                  <g>
                    <circle cx="28" cy="48" r="4" fill="#fca5a5" opacity="0.6" />
                    <circle cx="72" cy="48" r="4" fill="#fca5a5" opacity="0.6" />
                  </g>
                )}
              </g>
            ) : (
              <g>
                <circle cx="50" cy="40" r="25" fill="#1f2937" />
                <circle cx="40" cy="35" r="6" fill="white" />
                <circle cx="60" cy="35" r="6" fill="white" />
                <circle cx={anim === 'sad' ? "40" : "42"} cy={anim === 'sad' ? "37" : "35"} r="2.5" fill="black" />
                <circle cx={anim === 'sad' ? "60" : "58"} cy={anim === 'sad' ? "37" : "35"} r="2.5" fill="black" />
                {anim === 'angry' && (
                  <g>
                    <path d="M 75 20 L 80 25 L 75 30 M 80 25 L 85 20 M 80 25 L 85 30" stroke="red" strokeWidth="2" fill="none" />
                    <line x1="30" y1="28" x2="45" y2="31" stroke="white" strokeWidth="2" strokeLinecap="round" />
                    <line x1="70" y1="28" x2="55" y2="31" stroke="white" strokeWidth="2" strokeLinecap="round" />
                  </g>
                )}
                {anim === 'angry' || anim === 'sad' ? (
                  <path d="M 45 52 Q 50 47 55 52" stroke="white" strokeWidth="2" fill="none" />
                ) : anim === 'eat' ? (
                  <circle cx="50" cy="48" r="4" fill="#fca5a5" />
                ) : (
                  <path d="M 45 45 Q 50 52 55 45" stroke="white" strokeWidth="2" fill="none" />
                )}
              </g>
            )}
          </svg>
        </div>
      );
    };

    function App() {
      const [phase, setPhase] = useState('title');
      const [stats, setStats] = useState({ full: 100, mood: 100, clean: 100, xp: 0 });
      const [stageIdx, setStageIdx] = useState(0);
      const [poops, setPoops] = useState([]);
      const [anim, setAnim] = useState('idle');
      const [message, setMessage] = useState('よろしくね！');
      const [menu, setMenu] = useState('main');
      const [badCareCount, setBadCareCount] = useState(0);

      const [mgType, setMgType] = useState(null);
      const [mgState, setMgState] = useState('start');
      const [mgResult, setMgResult] = useState('');
      const [playerHand, setPlayerHand] = useState(null);
      const [enemyHand, setEnemyHand] = useState(null);

      const styles = `
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes happy-jump { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
        @keyframes sad-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes angry-shake { 0%, 100% { transform: translateX(0) translateY(0); } 25% { transform: translateX(-3px) translateY(3px); } 75% { transform: translateX(3px) translateY(-3px); } }
        @keyframes eat-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2) rotate(10deg); } }
        @keyframes tail-wag { 0% { transform: rotate(-15deg); } 100% { transform: rotate(15deg); } }
        .no-select { user-select: none; -webkit-user-select: none; }
      `;

      const triggerAnim = (animName, msg) => {
        setAnim(animName);
        if (msg) setMessage(msg);
        setTimeout(() => {
          setAnim(prev => {
            if (stats.full < 30 || stats.clean < 30 || poops.length >= 3) return 'angry';
            return 'idle';
          });
          if (msg) setMessage('');
        }, 1500);
      };

      useEffect(() => {
        if (phase !== 'main') return;
        const timer = setInterval(() => {
          let isBadCondition = false;
          setStats(prev => {
            let { full, mood, clean, xp } = prev;
            full = Math.max(0, full - 2);
            mood = Math.max(0, mood - 1);
            if (poops.length > 0) {
              clean = Math.max(0, clean - (poops.length * 2));
              mood = Math.max(0, mood - (poops.length * 1));
            }
            if (full > 50 && clean > 50 && mood > 50) xp += 2;
            if (full < 30 || clean < 30 || poops.length >= 3) isBadCondition = true;
            if (full < 30 || clean < 30 || poops.length >= 3) {
              if (anim === 'idle' || anim === 'sad' || anim === 'happy') setAnim('angry');
            } else {
              if (anim === 'angry' || anim === 'sad') setAnim('idle');
            }
            return { full, mood, clean, xp };
          });
          if (isBadCondition) setBadCareCount(prev => prev + 1);
          if (Math.random() < 0.15 && poops.length < 5) {
            setPoops(p => [...p, { id: Date.now(), x: Math.random() * 80 + 10, y: Math.random() * 30 + 60 }]);
          }
        }, 2000);
        return () => clearInterval(timer);
      }, [phase, poops.length, anim]);

      useEffect(() => {
        if (phase !== 'main') return;
        let requiredXp = 9999;
        if (stageIdx === 0) requiredXp = 100;
        else if (stageIdx === 1) requiredXp = 250;
        else if (stageIdx === 2) requiredXp = 450;
        else if (stageIdx === 3) requiredXp = 800;

        if (stats.xp >= requiredXp) {
          if (stageIdx === 3) {
            const isBadEnd = badCareCount >= 20;
            const nextStageId = isBadEnd ? 5 : 4;
            setStageIdx(nextStageId);
            const msg = isBadEnd ? 'あれ…？なんか様子が…？' : '進化した！立派なカエルになった！';
            triggerAnim(isBadEnd ? 'angry' : 'happy', msg);
            setTimeout(() => setPhase('result'), 2500);
          } else {
            const nextStageId = stageIdx + 1;
            setStageIdx(nextStageId);
            const nextStage = STAGES.find(s => s.id === nextStageId);
            triggerAnim('happy', `進化した！「${nextStage.name}」になったよ！`);
          }
        }
      }, [stats.xp, phase, stageIdx, badCareCount]);

      const feed = (food) => {
        if (stats.full >= 100) {
          triggerAnim('angry', 'もう食べられない！プイッ');
          return;
        }
        setStats(prev => ({
          ...prev, full: Math.min(100, prev.full + food.full), mood: Math.min(100, prev.mood + food.mood), xp: prev.xp + food.xp
        }));
        triggerAnim('eat', `${food.name} を食べた！`);
        setMenu('main');
      };

      const cleanRoom = () => {
        if (poops.length === 0 && stats.clean === 100) {
          setMessage('もうピカピカだよ！');
          setTimeout(() => setMessage(''), 1500);
          return;
        }
        setPoops([]);
        setStats(prev => ({ ...prev, clean: 100 }));
        triggerAnim('happy', 'スッキリした〜！');
      };

      const startMinigame = (type) => {
        if (stats.full < 20 || stats.clean < 20) {
          triggerAnim('angry', 'ごきげんななめだから遊びたくない！');
          return;
        }
        setMgType(type);
        setMgState('start');
        setPlayerHand(null);
        setEnemyHand(null);
        setMgResult('');
        setPhase('minigame');
        setMenu('main');
      };
      const playJanken = (hand) => {
        const hands = ['✊', '✌️', '✋'];
        const eHand = hands[Math.floor(Math.random() * 3)];
        setPlayerHand(hand);
        setEnemyHand(eHand);
        let res = 'draw';
        if ((hand === '✊' && eHand === '✌️') || (hand === '✌️' && eHand === '✋') || (hand === '✋' && eHand === '✊')) {
          res = 'win';
        } else if (hand !== eHand) {
          res = 'lose';
        }
        setMgResult(res);
        setMgState('result');
        setTimeout(() => applyMinigameResult(res, 20, 30), 2500);
      };

      const playAhoi = (dir) => {
        const dirs = ['👆', '👇', '👈', '👉'];
        const eDir = dirs[Math.floor(Math.random() * 4)];
        setPlayerHand(dir);
        setEnemyHand(eDir);
        const res = dir === eDir ? 'win' : 'lose';
        setMgResult(res);
        setMgState('result');
        setTimeout(() => applyMinigameResult(res, 30, 50), 2500);
      };

      const applyMinigameResult = (res, winXp, winMood) => {
        setPhase('main');
        if (res === 'win') {
          setStats(prev => ({ ...prev, xp: prev.xp + winXp, mood: Math.max(0, prev.mood - 10), full: Math.max(0, prev.full - 5) }));
          triggerAnim('sad', '負けちゃった…くやしい！');
        } else if (res === 'lose') {
          setStats(prev => ({ ...prev, xp: prev.xp + winXp, mood: Math.min(100, prev.mood + winMood), full: Math.max(0, prev.full - 5) }));
          triggerAnim('happy', 'やったー！ぼくの勝ち！');
        } else {
          triggerAnim('idle', 'あいこだね！');
        }
      };

      const resetGame = () => {
        setStats({ full: 100, mood: 100, clean: 100, xp: 0 });
        setStageIdx(0);
        setPoops([]);
        setBadCareCount(0);
        setAnim('idle');
        setPhase('main');
      };

      const StatusBar = ({ label, value, colorClass }) => (
        <div className="flex items-center text-sm font-bold w-full mb-1">
          <span className="w-16 text-gray-700">{label}</span>
          <div className="flex-1 bg-gray-300 h-3 rounded-full overflow-hidden mx-2 border border-gray-400">
            <div className={`h-full ${colorClass} transition-all duration-500`} style={{ width: `${value}%` }} />
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-sky-100 flex flex-col font-sans no-select relative overflow-hidden max-w-lg mx-auto shadow-2xl">
          <style>{styles}</style>

          {phase === 'title' && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-gradient-to-b from-sky-300 to-blue-500">
              <div className="bg-white/95 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 border-blue-400">
                <h1 className="text-4xl font-black text-blue-600 mb-2">オタマジャクソン<br/>育成ゲーム</h1>
                <div className="flex justify-center my-6">
                  <OtamajacksonSVG stageIdx={0} anim="idle" />
                </div>
                <p className="text-gray-700 font-bold mb-6 text-sm">
                  エサをあげて、ウンチを掃除しよう！<br/>
                  <span className="text-red-500">お世話をサボると怒っちゃうし、<br/>変な姿に進化するかも…？</span>
                </p>
                <button onClick={() => setPhase('main')} className="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-4 rounded-full shadow-[0_6px_0_#166534] active:translate-y-[6px] active:shadow-none transition-all">
                  育てる！
                </button>
              </div>
            </div>
          )}

          {phase === 'main' && (
            <div className="flex-1 flex flex-col bg-gradient-to-b from-cyan-100 to-blue-300">
              <div className="bg-white/90 p-4 shadow-md z-10 border-b-4 border-blue-200">
                <div className="flex justify-between items-end mb-2">
                  <h2 className="text-2xl font-black text-blue-800">オタマジャクソン</h2>
                  <span className="text-sm font-bold text-gray-500">進化: {STAGES[stageIdx].name}</span>
                </div>
                <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                  <StatusBar label="まんぷく" value={stats.full} colorClass="bg-orange-500" />
                  <StatusBar label="ごきげん" value={stats.mood} colorClass="bg-pink-500" />
                  <StatusBar label="せいけつ" value={stats.clean} colorClass="bg-blue-400" />
                </div>
                <div className="mt-2">
                  <div className="flex justify-between text-xs font-bold text-gray-600 mb-1">
                    <span>成長度 (XP)</span>
                    <span>{Math.floor(stats.xp)} / {STAGES[stageIdx + 1] ? STAGES[stageIdx + 1].requiredXp : 'MAX'}</span>
                  </div>
                  <div className="w-full bg-gray-300 h-2 rounded-full overflow-hidden">
                    <div className="bg-green-500 h-full transition-all duration-300" style={{ width: `${STAGES[stageIdx + 1] ? (stats.xp / STAGES[stageIdx + 1].requiredXp) * 100 : 100}%` }} />
                  </div>
                </div>
              </div>

              <div className="flex-1 relative flex items-center justify-center overflow-hidden bg-sky-200/50 border-4 border-blue-300 m-4 rounded-3xl shadow-inner">
                {message && (
                  <div className={`absolute top-4 px-4 py-2 rounded-2xl shadow-lg font-bold border-2 z-20 animate-[float_2s_ease-in-out_infinite] ${anim === 'angry' ? 'bg-red-100 border-red-400 text-red-800' : 'bg-white border-gray-200 text-gray-800'}`}>
                    {message}
                    <div className={`absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 rotate-45 border-r-2 border-b-2 ${anim === 'angry' ? 'bg-red-100 border-red-400' : 'bg-white border-gray-200'}`}></div>
                  </div>
                )}
                <div className="z-10">
                  <OtamajacksonSVG stageIdx={stageIdx} anim={anim} />
                </div>
                {poops.map(p => (
                  <div key={p.id} className="absolute text-4xl animate-[sad-shake_2s_linear_infinite]" style={{ left: `${p.x}%`, top: `${p.y}%` }}>💩</div>
                ))}
                <div className="absolute bottom-0 w-full h-1/4 bg-blue-400/30 rounded-b-2xl pointer-events-none"></div>
              </div>

              <div className="bg-white p-4 rounded-t-3xl shadow-[0_-4px_10px_rgba(0,0,0,0.1)] z-10 min-h-[160px]">
                {menu === 'main' && (
                  <div className="flex justify-around gap-2 h-full">
                    <button onClick={() => setMenu('food')} className="flex-1 flex flex-col items-center justify-center bg-orange-100 hover:bg-orange-200 border-2 border-orange-300 rounded-2xl p-2 transition-colors active:scale-95">
                      <span className="text-4xl mb-1">🍚</span><span className="font-bold text-orange-800">ごはん</span>
                    </button>
                    <button onClick={cleanRoom} className="flex-1 flex flex-col items-center justify-center bg-blue-100 hover:bg-blue-200 border-2 border-blue-300 rounded-2xl p-2 transition-colors active:scale-95 relative">
                      <span className="text-4xl mb-1">🧽</span><span className="font-bold text-blue-800">そうじ</span>
                      {poops.length > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-black px-2 py-1 rounded-full animate-pulse">{poops.length}</span>}
                    </button>
                    <button onClick={() => startMinigame('select')} className="flex-1 flex flex-col items-center justify-center bg-pink-100 hover:bg-pink-200 border-2 border-pink-300 rounded-2xl p-2 transition-colors active:scale-95">
                      <span className="text-4xl mb-1">🎮</span><span className="font-bold text-pink-800">あそぶ</span>
                    </button>
                  </div>
                )}

                {menu === 'food' && (
                  <div className="h-full flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="font-black text-orange-800">どれをあげる？</h3>
                      <button onClick={() => setMenu('main')} className="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm font-bold">もどる</button>
                    </div>
                    <div className="flex gap-2 overflow-x-auto pb-2">
                      {FOODS.map(f => (
                        <button key={f.id} onClick={() => feed(f)} className="min-w-[100px] flex-1 bg-orange-50 border border-orange-200 rounded-xl p-2 flex flex-col items-center active:bg-orange-200">
                          <span className="text-3xl mb-1">{f.emoji}</span><span className="text-xs font-bold text-gray-800">{f.name}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {menu === 'play' && (
                  <div className="h-full flex flex-col">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="font-black text-pink-800">なにしてあそぶ？</h3>
                      <button onClick={() => setMenu('main')} className="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm font-bold">もどる</button>
                    </div>
                    <div className="flex gap-4">
                      <button onClick={() => startMinigame('janken')} className="flex-1 bg-pink-50 border-2 border-pink-200 rounded-xl p-3 font-bold active:bg-pink-200 text-pink-900">✊ じゃんけん</button>
                      <button onClick={() => startMinigame('ahoi')} className="flex-1 bg-purple-50 border-2 border-purple-200 rounded-xl p-3 font-bold active:bg-purple-200 text-purple-900">👆 あっち向いて</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {phase === 'minigame' && (
            <div className="flex-1 flex flex-col bg-pink-100 justify-center items-center p-4">
              <div className="bg-white p-6 rounded-3xl shadow-xl max-w-sm w-full text-center border-4 border-pink-300">
                <h2 className="text-2xl font-black text-pink-600 mb-6">{mgType === 'janken' ? 'じゃんけん 勝負！' : 'あっち向いてホイ！'}</h2>
                {mgState === 'start' && (
                  <>
                    <div className="flex justify-center mb-6"><OtamajacksonSVG stageIdx={stageIdx} anim="idle" /></div>
                    {mgType === 'select' ? (
                      <div className="flex gap-4">
                        <button onClick={() => startMinigame('janken')} className="flex-1 bg-pink-50 border-2 border-pink-200 rounded-xl p-3 font-bold active:bg-pink-200">✊ じゃんけん</button>
                        <button onClick={() => startMinigame('ahoi')} className="flex-1 bg-purple-50 border-2 border-purple-200 rounded-xl p-3 font-bold active:bg-purple-200">👆 あっち向いて</button>
                      </div>
                    ) : mgType === 'janken' ? (
                      <div className="grid grid-cols-3 gap-4">
                        {['✊', '✌️', '✋'].map(h => (<button key={h} onClick={() => playJanken(h)} className="text-4xl bg-gray-100 p-4 rounded-xl border-2 border-gray-300 hover:bg-pink-50 active:scale-95">{h}</button>))}
                      </div>
                    ) : (
                      <div className="grid grid-cols-3 gap-4">
                        <div/><button onClick={() => playAhoi('👆')} className="text-4xl bg-gray-100 p-4 rounded-xl border-2 border-gray-300 active:scale-95">👆</button><div/>
                        <button onClick={() => playAhoi('👈')} className="text-4xl bg-gray-100 p-4 rounded-xl border-2 border-gray-300 active:scale-95">👈</button>
                        <div className="flex items-center justify-center font-black text-gray-400">顔</div>
                        <button onClick={() => playAhoi('👉')} className="text-4xl bg-gray-100 p-4 rounded-xl border-2 border-gray-300 active:scale-95">👉</button>
                        <div/><button onClick={() => playAhoi('👇')} className="text-4xl bg-gray-100 p-4 rounded-xl border-2 border-gray-300 active:scale-95">👇</button><div/>
                      </div>
                    )}
                    <button onClick={() => setPhase('main')} className="mt-6 text-gray-500 font-bold underline">やめる</button>
                  </>
                )}
                {mgState === 'result' && (
                  <div className="animate-[pulse-fast_0.3s_ease-in-out]">
                    <div className="flex justify-around items-center mb-8">
                      <div className="flex flex-col items-center">
                        <span className="text-sm font-bold text-blue-600 mb-2">あなた</span>
                        <span className="text-6xl bg-blue-100 p-4 rounded-full border-4 border-blue-300">{playerHand}</span>
                      </div>
                      <div className="text-3xl font-black text-red-500">VS</div>
                      <div className="flex flex-col items-center">
                        <span className="text-sm font-bold text-green-600 mb-2">オタマ</span>
                        <span className="text-6xl bg-green-100 p-4 rounded-full border-4 border-green-300">{enemyHand}</span>
                      </div>
                    </div>
                    <div className="text-4xl font-black mb-4">
                      {mgResult === 'win' && <span className="text-red-500">きみの勝ち！！🎉</span>}
                      {mgResult === 'lose' && <span className="text-blue-500">きみの負け…💧</span>}
                      {mgResult === 'draw' && <span className="text-gray-600">あいこ！</span>}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {phase === 'result' && (
            <div className={`flex-1 flex flex-col items-center justify-center p-6 z-50 absolute inset-0 ${stageIdx === 5 ? 'bg-gradient-to-t from-purple-600 to-gray-800' : 'bg-gradient-to-t from-green-400 to-sky-300'}`}>
              <div className={`bg-white/95 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 animate-[float_2s_ease-in-out_infinite] ${stageIdx === 5 ? 'border-purple-500' : 'border-yellow-400'}`}>
                <h2 className={`text-3xl font-black mb-4 ${stageIdx === 5 ? 'text-purple-700' : 'text-green-700'}`}>
                  {stageIdx === 5 ? '飼育失敗…！？' : '飼育成功！！'}
                </h2>
                <div className="flex justify-center mb-6">
                   <OtamajacksonSVG stageIdx={stageIdx} anim="idle" />
                </div>
                <p className={`text-lg font-bold mb-6 p-4 rounded-xl ${stageIdx === 5 ? 'bg-gray-200 text-gray-800' : 'bg-yellow-100 text-gray-800'}`}>
                  {stageIdx === 5 ? 'お世話をサボりすぎたせいで、\nグレて「ツッパリガエル」になっちゃった！' : 'オタマジャクソンは立派なカエルに成長した！お世話ありがとう！'}
                </p>
                <button onClick={resetGame} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-xl font-black py-4 rounded-full shadow-[0_6px_0_#1e3a8a] active:translate-y-[6px] active:shadow-none transition-all">
                  最初からやり直す
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
